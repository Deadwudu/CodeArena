<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CodeArena</title>

    <style>
        body{
            margin:0;
            font-family: Arial, Helvetica, sans-serif;
            background:#0f172a;
            color:white;
        }

        header{
            background:#020617;
            padding:20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            border-bottom:1px solid #1e293b;
        }

        .logo{
            font-size:24px;
            font-weight:bold;
            color:#22c55e;
        }

        .container{
            width:1100px;
            margin:40px auto;
        }

        h1{
            margin-bottom:30px;
        }

        .task-list{
            display:flex;
            flex-direction:column;
            gap:15px;
        }

        .task{
            background:#020617;
            padding:20px;
            border-radius:10px;
            cursor:pointer;
            transition:0.2s;
            border:1px solid #1e293b;
        }

        .task:hover{
            transform:scale(1.02);
            border-color:#22c55e;
        }

        .difficulty{
            float:right;
            padding:5px 10px;
            border-radius:6px;
            font-size:12px;
        }

        .easy{ background:#16a34a; }
        .medium{ background:#ca8a04; }
        .hard{ background:#dc2626; }

    </style>

</head>
<body>

<header>
    <div class="logo">CodeArena</div>
    <div>Профиль</div>
    <div onclick="goAdmin()">Админка</div>

</header>

<div class="container">
    <h1>Список задач</h1>
    <div class="task-list">
</div>
    </div>
</div>


<script>
function goAdmin(){
    window.location.href = "admin.html"
}
async function loadTasks(){

    try{

        const res = await fetch("/api/tasks")

        if(!res.ok){
            throw new Error("Ошибка загрузки задач")
        }

        const tasks = await res.json()

        const list = document.querySelector(".task-list")

        list.innerHTML = ""

        tasks.forEach(task => {

            const div = document.createElement("div")
            div.className = "task"

            div.innerHTML = `
                <span class="difficulty ${task.difficulty}">
                    ${task.difficulty}
                </span>

                <h3>${task.title}</h3>
                <p>Нажмите чтобы открыть задачу</p>
            `

            div.onclick = () => {
                window.location.href =
                    "task.html?task=" + task.id
            }

            list.appendChild(div)

        })

    }
    catch(e){

        console.error(e)

        document.querySelector(".task-list").innerHTML =
            "<h3>Не удалось загрузить задачи</h3>"

    }

}

loadTasks()

</script>
</body>
</html>
