<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/codemirror@5/lib/codemirror.css">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/codemirror@5/theme/material.css">

<script src="https://cdn.jsdelivr.net/npm/codemirror@5/lib/codemirror.js"></script>

<script src="https://cdn.jsdelivr.net/npm/codemirror@5/mode/javascript/javascript.js"></script>
<title>Задача</title>

<style>
body{
    margin:0;
    background:#0f172a;
    color:white;
    font-family:Arial;
}

header{
    background:#020617;
    padding:20px;
    border-bottom:1px solid #1e293b;
}

.container{
    width:1100px;
    margin:30px auto;
    display:flex;
    gap:30px;
}

.description{
    width:40%;
}

.editor{
    width:60%;
}

textarea{
    width:100%;
    height:400px;
    background:#020617;
    color:white;
    border:1px solid #1e293b;
    border-radius:10px;
    padding:15px;
    font-size:14px;
}

button{
    margin-top:15px;
    padding:10px 20px;
    background:#22c55e;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}
#resultBox{
    margin-top:15px;
    padding:15px;
    border-radius:10px;
    font-weight:bold;
}

.pass{
    background:#16a34a;
}

.fail{
    background:#dc2626;
}

.error{
    background:#ca8a04;
}

.attempt{
    background:#020617;
    border:1px solid #1e293b;
    padding:10px;
    border-radius:8px;
    margin-top:8px;
    font-size:12px;
}

</style>

</head>
<body>

<header>
    CodeArena
</header>

<div class="container">

   <div class="description">

    <h2 id="title"></h2>
    <div id="difficulty"></div>

    <h3>Описание</h3>
    <div id="desc"></div>

    <h3>Примеры</h3>
    <pre id="examples"></pre>

</div>

    <div class="editor">
        <div id="editor"></div>
        <div id="resultBox"></div>
    <h3>История попыток</h3>
    <div id="attempts"></div>
        <button onclick="run()">Run</button>
    </div>

</div>

<script>
let editor
   async function run(){

    const user = JSON.parse(localStorage.getItem("user"))

    // 🔴 ВОТ ЗДЕСЬ ПРОВЕРКА
    if(!user){
        alert("Сначала войди в аккаунт")
        return
    }

    const params = new URLSearchParams(window.location.search)
    const taskId = params.get("task")

    const code = editor.getValue()

    const res = await fetch("/api/run",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify({
            code,
            taskId,
            userId: user.id
        })
    })

    const data = await res.json()

    const box = document.getElementById("resultBox")

    box.className = ""

    if(data.result === "PASS"){
        box.classList.add("pass")
        box.innerText = "✅ Решение принято"
    }
    else if(data.result === "FAIL"){
        box.classList.add("fail")
        box.innerText = "❌ Неверный результат"
    }
    else{
        box.classList.add("error")
        box.innerText = "⚠ Ошибка выполнения"
    }

    loadAttempts()
}

async function loadAttempts(){

    const params = new URLSearchParams(window.location.search)
    const taskId = params.get("task")

    const res =
        await fetch("/api/attempts/" + taskId)

    const attempts = await res.json()

    const container =
        document.getElementById("attempts")

    container.innerHTML = ""

    attempts.forEach(a => {

        const div = document.createElement("div")
        div.className = "attempt"

        div.innerText =
            a.result + " | " + a.createdAt

        container.appendChild(div)

    })

}

async function loadTask(){
    const params = new URLSearchParams(window.location.search)
    const taskId = params.get("task")

    if(!taskId){
        document.body.innerHTML = "Нет id задачи"
        return
    }

    try{

        const res = await fetch("/api/tasks/" + taskId)

        if(!res.ok){
            document.body.innerHTML = "Задача не найдена"
            return
        }

        const task = await res.json()

        document.getElementById("title").innerText =
            task.title

        document.getElementById("difficulty").innerText =
            task.difficulty

        document.getElementById("desc").innerText =
            task.description

        document.getElementById("examples").innerText =
            "Примеры скоро будут"
            loadAttempts()
            editor = CodeMirror(
    document.getElementById("editor"),
    {
        value: "// напишите решение",
        mode: "javascript",
        theme: "material",
        lineNumbers: true
    }
)

    }
    catch(e){

        console.error(e)

        document.body.innerHTML =
            "Ошибка загрузки задачи"

    }


}

loadTask()



</script>
</body>
</html>
