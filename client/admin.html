<h2>Админ панель</h2>

<input id="title" placeholder="Название"><br>
<input id="difficulty" placeholder="easy / medium / hard"><br>
<textarea id="desc" placeholder="Описание"></textarea><br>

<button onclick="createTask()">Создать задачу</button>

<hr>

<div id="tasks"></div>

<script>

const user = JSON.parse(localStorage.getItem("user"))

if(!user || user.role !== "admin"){
    document.body.innerHTML = "Нет доступа"
}

// создать задачу
async function createTask(){

    const res = await fetch("/api/tasks",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
            title: title.value,
            difficulty: difficulty.value,
            description: desc.value,
            userId: user.id
        })
    })

    const data = await res.json()

    alert("Создано")

    loadTasks()
}

// загрузка задач
async function loadTasks(){

    const res = await fetch("/api/tasks")
    const tasks = await res.json()

    const container = document.getElementById("tasks")
    container.innerHTML = ""

    tasks.forEach(t => {

        const div = document.createElement("div")

        div.innerHTML = `
            <b>${t.title}</b>
            <button onclick="deleteTask('${t.id}')">Удалить</button>
        `

        container.appendChild(div)

    })

}

// удалить
async function deleteTask(id){

    await fetch("/api/tasks/" + id,{
        method:"DELETE",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
            userId: user.id
        })
    })

    loadTasks()
}

loadTasks()

</script>
